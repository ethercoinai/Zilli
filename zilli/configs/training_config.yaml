training:
  framework: "slime + Miles"
  inference_engine: "SGLang"
  training_engine: "Megatron-LM"
  algorithm: "CISPO"
  num_epochs: 100
  batch_size: 128
  checkpoint_interval: 20
  window_sec: 60
  timeout_per_task: 300
  max_retries: 2
  log_dir: "./experiments"

  store_config:
    max_size: 10000
    min_reward_for_golden: 0.8
    max_reward_for_failure: 0.3
    cleaner_config:
      max_dedup_similarity: 0.85
      max_anomaly_std: 2.0
      min_trajectory_length: 2

  cluster:
    train_gpus: 8
    inference_gpus: 16
    colocated: false

  optimization:
    on_policy_strictness: "bitwise"
    context_window_limit: 32768
    off_policy_ratio_limit: 0.15
    clip_range: 0.2
    kl_penalty: 0.01
    is_weight_cap: 5.0
    gamma: 0.99
    gae_lambda: 0.95
    entropy_coef: 0.01

  model:
    type: "mixtral_moe"
    hidden_size: 4096
    num_layers: 32
    num_experts: 8
    top_k: 2

  checkpoint:
    dir: "./checkpoints"
    interval_steps: 100
    keep_last_n: 5

  distillation:
    lambda_bc: 1.0
    lambda_rl: 0.5
    lambda_reg: 0.1
    kl_beta: 0.1
    reward_gamma: 0.2
    embedding_delta: 0.5
    lora_threshold: 1000
    distill_interval_hours: 24
    full_sft_interval_days: 7

  arena:
    min_win_gap: 0.05
    significance_level: 0.05
    min_eval_tasks: 10
    warmup_rounds: 3
