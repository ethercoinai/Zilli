[advisories]
db-url = "https://github.com/rustsec/advisory-db"
vulnerability = "deny"
unmaintained = "warn"
unsound = "deny"
yanked = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "denon"
allow-osi-fsf-free = "neither"
copyleft = "deny"
default = "deny"
permissive = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "CC0-1.0", "Zlib", "OpenSSL"]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]
